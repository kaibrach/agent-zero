<html>
<head>
    <title>Browse Skills</title>
    <script type="module">
        import { store } from "/components/settings/skills/skills-list-store.js";
    </script>
</head>
<body>
    <div x-data>
        <template x-if="$store.skillsListStore">
            <div x-init="$store.skillsListStore.init('browse')" x-destroy="$store.skillsListStore.onClose()">

                <div class="section-title">Browse Skills</div>
                <div class="section-description">
                    Search agentskill.sh and install skills into the selected project and agent scope.
                </div>

                <div class="skills-toolbar registry-toolbar">
                    <div class="skills-toolbar-row">
                        <label class="skills-toolbar-item">
                            <span class="skills-toolbar-label">Project</span>
                            <select x-model="$store.skillsListStore.projectName"
                                @change="Promise.all([$store.skillsListStore.loadSkills(), $store.skillsListStore.loadRegistrySkills()])">
                                <option value="">All</option>
                                <template x-for="project in $store.skillsListStore.projects" :key="project.key">
                                    <option :value="project.key" x-text="project.label"></option>
                                </template>
                            </select>
                        </label>

                        <label class="skills-toolbar-item">
                            <span class="skills-toolbar-label">Agent profile</span>
                            <select x-model="$store.skillsListStore.agentProfileKey"
                                @change="Promise.all([$store.skillsListStore.loadSkills(), $store.skillsListStore.loadRegistrySkills()])">
                                <option value="">All</option>
                                <template x-for="agentProfile in $store.skillsListStore.agentProfiles" :key="agentProfile.key">
                                    <option :value="agentProfile.key" x-text="agentProfile.label"></option>
                                </template>
                            </select>
                        </label>
                    </div>

                    <div class="skills-toolbar-row">
                        <label class="skills-toolbar-item registry-search-item">
                            <span class="skills-toolbar-label">Search</span>
                            <input type="text" x-model="$store.skillsListStore.registryQuery"
                                @input="$store.skillsListStore.scheduleRegistrySearch()"
                                placeholder="Search skills, owners, or topics" />
                        </label>

                        <div class="skills-toolbar-actions">
                            <button type="button" class="button" title="Search registry"
                                @click="$store.skillsListStore.loadRegistrySkills()"
                                :disabled="$store.skillsListStore.registryLoading">
                                <span class="icon material-symbols-outlined">search</span>
                                <span x-text="$store.skillsListStore.registryLoading ? 'Searching...' : 'Search'"></span>
                            </button>
                        </div>
                    </div>
                </div>

                <div x-show="$store.skillsListStore.registryError" class="error">
                    <span x-text="$store.skillsListStore.registryError"></span>
                </div>

                <template
                    x-if="!$store.skillsListStore.registryLoading && !$store.skillsListStore.registryError && $store.skillsListStore.registrySkills.length === 0">
                    <div class="skills-empty">No registry skills found.</div>
                </template>

                <div x-show="$store.skillsListStore.registryLoading" class="loading">
                    <span>Loading registry skills...</span>
                </div>

                <div class="skills-list">
                    <template x-for="skill in $store.skillsListStore.registrySkills"
                        :key="$store.skillsListStore.registrySkillKey(skill)">
                        <div class="skill-card">
                            <div class="skill-header">
                                <div class="skill-heading">
                                    <div class="skill-title" x-text="skill.name || skill.slug || '(unnamed skill)'"></div>
                                    <div class="skill-badges">
                                        <span class="skill-badge skill-badge-registry"
                                            x-text="`${skill.owner}/${skill.slug}`"></span>
                                        <template x-if="skill.category">
                                            <span class="skill-badge" x-text="skill.category"></span>
                                        </template>
                                        <template x-if="skill.securityScore !== undefined && skill.securityScore !== null">
                                            <span class="skill-badge" x-text="`Security ${skill.securityScore}`"></span>
                                        </template>
                                    </div>
                                </div>
                                <div class="skill-actions">
                                    <template x-if="$store.skillsListStore.installedRegistrySkill(skill)">
                                        <button type="button" class="button" title="Update installed skill"
                                            @click="$store.skillsListStore.updateSkill($store.skillsListStore.installedRegistrySkill(skill))"
                                            :disabled="$store.skillsListStore.busyKey === `update:${$store.skillsListStore.installedRegistrySkill(skill)?.path || ''}`">
                                            <span class="icon material-symbols-outlined">system_update</span>
                                            <span x-text="$store.skillsListStore.busyKey === `update:${$store.skillsListStore.installedRegistrySkill(skill)?.path || ''}` ? 'Updating...' : 'Update'"></span>
                                        </button>
                                    </template>
                                    <button type="button" class="button confirm" title="Install skill"
                                        @click="$store.skillsListStore.openInstallDialog(skill)"
                                        :disabled="$store.skillsListStore.busyKey === `install:${$store.skillsListStore.registrySkillKey(skill)}`">
                                        <span class="icon material-symbols-outlined"
                                            x-text="$store.skillsListStore.isRegistryInstalled(skill) ? 'content_copy' : 'download'"></span>
                                        <span x-text="$store.skillsListStore.isRegistryInstalled(skill) ? 'Install Copy' : 'Install'"></span>
                                    </button>
                                </div>
                            </div>
                            <div class="skill-description"
                                x-text="skill.description || skill.summary || 'No description provided.'"></div>
                            <template x-if="skill.tags && skill.tags.length">
                                <div class="skill-tags">
                                    <template x-for="tag in skill.tags" :key="tag">
                                        <span class="skill-tag" x-text="tag"></span>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>

                <div class="skill-install-mask"
                    x-show="$store.skillsListStore.installDialogOpen"
                    x-transition.opacity
                    style="display: none;"
                    @click.self="$store.skillsListStore.closeInstallDialog()">
                    <div class="skill-install-panel">
                        <div class="skill-install-panel-header">
                            <div>
                                <div class="section-title">Install Skill</div>
                                <div class="section-description" x-text="$store.skillsListStore.installSkill ? `Configure how ${$store.skillsListStore.installSkill.owner}/${$store.skillsListStore.installSkill.slug} should be installed.` : 'Configure the install target.'"></div>
                            </div>
                            <button type="button" class="button icon-button" title="Close"
                                @click="$store.skillsListStore.closeInstallDialog()">
                                <span class="icon material-symbols-outlined">close</span>
                            </button>
                        </div>

                        <div class="preview install-preview" x-show="$store.skillsListStore.installSkill">
                            <div class="preview-meta">
                                <div>Skill: <code x-text="$store.skillsListStore.installSkill ? `${$store.skillsListStore.installSkill.owner}/${$store.skillsListStore.installSkill.slug}` : ''"></code></div>
                                <div>Destination: <code x-text="$store.skillsListStore.installDestinationPreview()"></code></div>
                            </div>
                            <div class="skill-description"
                                x-text="$store.skillsListStore.installSkill?.description || $store.skillsListStore.installSkill?.summary || 'No description provided.'"></div>
                        </div>

                        <div class="options">
                            <label class="policy-label">
                                <span class="policy-label-text">Limit to project:</span>
                                <select x-model="$store.skillsListStore.installProjectName" class="policy-dropdown">
                                    <option value="">All</option>
                                    <template x-for="project in $store.skillsListStore.projects" :key="project.key">
                                        <option :value="project.key" x-text="project.label"></option>
                                    </template>
                                </select>
                            </label>

                            <label class="policy-label">
                                <span class="policy-label-text">Limit to agent profile:</span>
                                <select x-model="$store.skillsListStore.installAgentProfileKey" class="policy-dropdown">
                                    <option value="">All</option>
                                    <template x-for="agentProfile in $store.skillsListStore.agentProfiles" :key="agentProfile.key">
                                        <option :value="agentProfile.key" x-text="agentProfile.label"></option>
                                    </template>
                                </select>
                            </label>

                            <label class="policy-label">
                                <span class="policy-label-text">Namespace:</span>
                                <input class="text-input" type="text" placeholder="e.g. authors or my-pack"
                                    x-model="$store.skillsListStore.installNamespace">
                            </label>

                            <label class="policy-label">
                                <span class="policy-label-text">Conflict policy:</span>
                                <select x-model="$store.skillsListStore.installConflict" class="policy-dropdown">
                                    <option value="skip">Skip existing</option>
                                    <option value="rename">Rename (add _2, _3...)</option>
                                    <option value="overwrite">Overwrite existing</option>
                                </select>
                            </label>
                        </div>

                        <div x-show="$store.skillsListStore.installError" class="error">
                            <span x-text="$store.skillsListStore.installError"></span>
                        </div>

                        <div class="buttons skill-install-buttons">
                            <button class="btn slim" @click="$store.skillsListStore.closeInstallDialog()"
                                :disabled="$store.skillsListStore.busyKey === `install:${$store.skillsListStore.registrySkillKey($store.skillsListStore.installSkill || {})}`">Cancel</button>
                            <button class="btn slim primary"
                                @click="$store.skillsListStore.installRegistrySkill($store.skillsListStore.installSkill)"
                                :disabled="!$store.skillsListStore.installSkill || $store.skillsListStore.busyKey === `install:${$store.skillsListStore.registrySkillKey($store.skillsListStore.installSkill || {})}`">
                                <span x-text="$store.skillsListStore.busyKey === `install:${$store.skillsListStore.registrySkillKey($store.skillsListStore.installSkill || {})}` ? 'Installing...' : 'Install Skill'"></span>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </template>
    </div>

    <style>
        .skills-toolbar {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            margin-top: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .skills-toolbar-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .skills-toolbar-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1 1 18rem;
            min-width: 12rem;
            margin: 0;
        }

        .registry-search-item {
            flex: 1 1 26rem;
        }

        .skills-toolbar-label {
            font-weight: 600;
            color: var(--color-text-secondary);
            white-space: nowrap;
        }

        .skills-toolbar-item select,
        .skills-toolbar-item input {
            flex: 1 1 auto;
            min-width: 0;
        }

        .skills-toolbar-actions {
            margin-left: auto;
            display: flex;
            gap: var(--spacing-sm);
            flex: 0 0 auto;
        }

        .skills-list {
            margin-top: 0.25rem;
        }

        .skill-card {
            border: 1px solid var(--color-border);
            border-radius: 10px;
            padding: 0.75rem;
            margin-top: 0.75rem;
            background: var(--color-background);
        }

        .skill-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: nowrap;
            min-width: 0;
        }

        .skill-heading {
            display: flex;
            flex-direction: column;
            min-width: 0;
            flex: 1 1 auto;
        }

        .skill-title {
            font-weight: 600;
            font-size: 1rem;
            min-width: 0;
            flex: 1 1 auto;
        }

        .skill-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-bottom: var(--spacing-sm);
            flex-wrap: wrap;
            min-width: 0;
            flex: 0 1 auto;
            max-width: 100%;
            justify-content: flex-end;
        }

        .skill-description {
            margin-top: 0.35rem;
            color: var(--color-text-secondary);
            font-size: var(--font-size-small);
        }

        .skill-badges,
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        .skill-badge,
        .skill-tag {
            display: inline-flex;
            align-items: center;
            padding: 0.15rem 0.45rem;
            border-radius: 999px;
            border: 1px solid var(--color-border);
            background: var(--color-bg-secondary);
            color: var(--color-text-secondary);
            font-size: 0.75rem;
            line-height: 1.2;
        }

        .skill-badge-registry {
            border-color: color-mix(in srgb, var(--color-secondary) 35%, var(--color-border));
            color: var(--color-secondary);
        }

        .skills-empty {
            margin-top: 1rem;
            padding: 0.75rem;
            border: 1px dashed var(--color-border);
            border-radius: 4px;
            text-align: center;
            color: var(--color-text-secondary);
        }

        .loading {
            width: 100%;
            text-align: center;
            margin-top: 1rem;
            margin-bottom: 1rem;
            color: var(--color-secondary);
        }

        .error {
            color: var(--color-error);
            margin: 0.5rem 0;
            padding: 0.5rem;
            background: var(--color-error-bg);
            border-radius: 4px;
        }

        .options {
            margin: 1rem 0;
            padding: 0.75rem;
            background: var(--color-input);
            border: 1px solid var(--color-border);
            border-radius: 10px;
        }

        .policy-label {
            display: grid;
            grid-template-columns: minmax(10rem, 14rem) 1fr;
            align-items: center;
            column-gap: 0.75rem;
            row-gap: 0.25rem;
            margin: 0.5rem 0;
        }

        .policy-label-text {
            font-weight: 600;
            white-space: normal;
            width: auto;
        }

        .policy-dropdown,
        .text-input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            font-size: 0.9rem;
        }

        .buttons {
            margin-top: 0.75rem;
            display: flex;
            gap: 0.5rem;
        }

        .preview {
            margin-top: 1rem;
            padding: 0.75rem;
            background: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: 10px;
        }

        .preview-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.25rem 1rem;
            margin-bottom: 0.5rem;
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        .skill-install-mask {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: color-mix(in srgb, #08121d 64%, transparent);
            backdrop-filter: blur(8px);
        }

        .skill-install-panel {
            width: min(720px, 100%);
            max-height: min(90vh, 820px);
            overflow: auto;
            padding: 1rem;
            border: 1px solid color-mix(in srgb, var(--color-secondary) 18%, var(--color-border));
            border-radius: 16px;
            background: linear-gradient(180deg,
                color-mix(in srgb, var(--color-background) 95%, white 5%),
                var(--color-background));
            box-shadow: 0 28px 64px rgba(3, 10, 18, 0.35);
        }

        .skill-install-panel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
        }

        .install-preview {
            margin-top: 0.75rem;
        }

        .skill-install-buttons {
            justify-content: flex-end;
        }

        @media (max-width: 640px) {
            .skills-toolbar-row {
                gap: 0.5rem;
            }

            .skills-toolbar-item {
                flex-basis: 100%;
                min-width: 0;
            }

            .skills-toolbar-actions {
                width: 100%;
                margin-left: 0;
            }

            .skills-toolbar-actions .button {
                width: 100%;
            }

            .skill-header {
                flex-direction: column;
                align-items: stretch;
            }

            .skill-actions {
                width: 100%;
                justify-content: flex-start;
                padding-bottom: 0;
            }

            .policy-label,
            .preview-meta {
                grid-template-columns: 1fr;
            }

            .skill-install-panel {
                padding: 0.85rem;
            }

            .skill-install-panel-header {
                flex-direction: column;
                align-items: stretch;
            }

            .skill-install-buttons {
                flex-direction: column-reverse;
            }

            .skill-install-buttons .btn {
                width: 100%;
            }
        }
    </style>
</body>
</html>
