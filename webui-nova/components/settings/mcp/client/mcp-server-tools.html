<html>

<head>
    <title>MCP Server Detail</title>

    <script type="module">
        import { store } from "/components/settings/mcp/client/mcp-servers-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.mcpServersStore">
            <div>
                <div class="detail-header">
                    <div>
                        <h3 x-text="$store.mcpServersStore.serverDetail?.name || 'MCP Server Tools'"></h3>
                        <p x-text="$store.mcpServersStore.serverDetail?.description || 'Inspect and control which tools remain available to agents.'"></p>
                    </div>
                    <div class="detail-summary"
                        x-text="`${($store.mcpServersStore.serverDetail?.tools || []).filter(tool => !tool.disabled).length}/${($store.mcpServersStore.serverDetail?.tools || []).length} enabled`"></div>
                </div>

                <template x-if="$store.mcpServersStore.serverDetailError">
                    <div class="error-banner" x-text="$store.mcpServersStore.serverDetailError"></div>
                </template>

                <template x-if="!$store.mcpServersStore.serverDetailError && ($store.mcpServersStore.serverDetail?.tools || []).length === 0">
                    <div class="empty-state">No tools were returned for this MCP server.</div>
                </template>

                <div class="tools-container">
                    <template x-for="tool in ($store.mcpServersStore.serverDetail?.tools || [])" :key="tool.name">
                        <div class="tool-item">
                            <div class="tool-header">
                                <div>
                                    <h4 x-text="tool.name"></h4>
                                    <div class="tool-status" :class="tool.disabled ? 'is-disabled' : 'is-enabled'"
                                        x-text="tool.disabled ? 'Disabled' : 'Enabled'"></div>
                                </div>
                                <label class="switch-toggle" :class="tool.disabled ? 'is-off' : 'is-on'">
                                    <input type="checkbox"
                                        :checked="!tool.disabled"
                                        @change="$store.mcpServersStore.setToolEnabled($store.mcpServersStore.serverDetail.runtime_name || $store.mcpServersStore.serverDetail.name, tool.name, $event.target.checked)" />
                                    <span class="switch-track" aria-hidden="true">
                                        <span class="switch-thumb"></span>
                                    </span>
                                    <span class="switch-copy">
                                        <span class="switch-label">Tool</span>
                                        <span class="switch-state" x-text="tool.disabled ? 'OFF' : 'ON'"></span>
                                    </span>
                                </label>
                            </div>
                            <p class="tool-description" x-text="tool.description"></p>

                            <template x-if="tool.input_schema?.properties">
                                <div class="tool-properties">
                                    <p class="properties-title">Properties:</p>
                                    <ul>
                                        <template x-for="(prop, propName) in tool.input_schema.properties"
                                            :key="propName">
                                            <li>
                                                <span class="prop-name" x-text="propName"></span>:
                                                <span class="prop-type" x-text="prop.type || 'any'"></span>
                                                <template x-if="prop.description">
                                                    <span class="prop-desc" x-text="' - ' + prop.description"></span>
                                                </template>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>

    <style>
        .detail-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
        }

        .detail-summary {
            padding: 0.35rem 0.65rem;
            border-radius: 999px;
            border: 1px solid rgba(192, 192, 192, 0.16);
            color: var(--color-text-secondary);
            white-space: nowrap;
        }

        .error-banner,
        .empty-state {
            margin-top: 1rem;
            padding: 0.85rem 1rem;
            border-radius: 8px;
        }

        .error-banner {
            background: rgba(176, 43, 43, 0.12);
            border: 1px solid rgba(176, 43, 43, 0.28);
            color: #a53232;
        }

        .empty-state {
            background: rgba(106, 118, 138, 0.08);
            border: 1px solid rgba(106, 118, 138, 0.18);
            color: var(--color-text-secondary);
        }

        .tools-container {
            margin-top: 1.5em;
            display: flex;
            flex-direction: column;
            gap: 1.2em;
        }

        .tool-item {
            padding: 1em;
            border: 1px solid rgba(192, 192, 192, 0.16);
            border-radius: 4px;
        }

        .tool-item h4 {
            margin-top: 0;
            margin-bottom: 0.5em;
            font-size: 1.1em;
        }

        .tool-status {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.8rem;
            color: var(--color-text-secondary);
        }

        .tool-status::before {
            content: "";
            width: 0.55rem;
            height: 0.55rem;
            border-radius: 999px;
            background: #7c8c9f;
        }

        .tool-status.is-enabled::before {
            background: #2b8a57;
        }

        .tool-status.is-disabled::before {
            background: #b02b2b;
        }

        .tool-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .switch-toggle {
            --switch-track: color-mix(in srgb, var(--color-bg-secondary) 82%, transparent);
            --switch-border: color-mix(in srgb, var(--color-border) 78%, transparent);
            --switch-copy: var(--color-text-secondary);
            --switch-glow: rgba(43, 138, 87, 0.22);
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            min-height: 2.75rem;
            padding: 0.35rem 0.5rem 0.35rem 0.35rem;
            border-radius: 999px;
            border: 1px solid var(--switch-border);
            background: linear-gradient(180deg, color-mix(in srgb, var(--color-background) 88%, white 12%), var(--color-background));
            box-shadow: 0 10px 24px rgba(3, 10, 18, 0.08);
            cursor: pointer;
            user-select: none;
        }

        .switch-toggle input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .switch-track {
            position: relative;
            display: inline-flex;
            align-items: center;
            width: 3.3rem;
            height: 1.9rem;
            border-radius: 999px;
            background: var(--switch-track);
            border: 1px solid var(--switch-border);
            transition: background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .switch-thumb {
            position: absolute;
            top: 0.15rem;
            left: 0.15rem;
            width: 1.45rem;
            height: 1.45rem;
            border-radius: 999px;
            background: linear-gradient(180deg, #ffffff, #dfe9f1);
            box-shadow: 0 4px 10px rgba(3, 10, 18, 0.2);
            transition: transform 180ms ease;
        }

        .switch-copy {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.1;
        }

        .switch-label {
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--switch-copy);
        }

        .switch-state {
            font-size: 0.83rem;
            font-weight: 700;
            color: var(--color-text-primary);
        }

        .switch-toggle.is-on {
            --switch-track: linear-gradient(135deg, color-mix(in srgb, var(--color-secondary) 84%, #2b8a57 16%), #2b8a57);
            --switch-border: color-mix(in srgb, var(--color-secondary) 38%, var(--color-border));
            --switch-copy: color-mix(in srgb, var(--color-secondary) 56%, var(--color-text-secondary));
        }

        .switch-toggle.is-on .switch-track {
            box-shadow: 0 0 0 4px var(--switch-glow);
        }

        .switch-toggle.is-on .switch-thumb {
            transform: translateX(1.36rem);
        }

        .switch-toggle.is-off {
            --switch-track: linear-gradient(135deg, color-mix(in srgb, var(--color-bg-secondary) 86%, #c4d0d9 14%), color-mix(in srgb, var(--color-bg-secondary) 94%, transparent));
            --switch-border: color-mix(in srgb, var(--color-border) 84%, transparent);
            --switch-copy: var(--color-text-secondary);
        }

        .switch-toggle:focus-within {
            outline: 2px solid color-mix(in srgb, var(--color-secondary) 55%, transparent);
            outline-offset: 2px;
        }

        .tool-description {
            margin-bottom: 1em;
            color: var(--c-fg);
            line-height: 1.4;
        }

        .tool-properties {
            margin-top: 0.8em;
            padding: 0.8em;
            background-color: rgba(0, 0, 0, 0.04);
            border-radius: 3px;
        }

        .properties-title {
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 0.5em;
        }

        .tool-properties ul {
            margin: 0;
            padding-left: 1.5em;
        }

        .tool-properties li {
            margin-bottom: 0.3em;
        }

        .prop-name {
            font-weight: 600;
            color: var(--c-accent);
        }

        .prop-type {
            color: var(--c-fg2);
            font-style: italic;
        }

        .prop-desc {
            color: var(--c-fg);
        }

        @media (max-width: 640px) {
            .detail-header {
                flex-direction: column;
            }

            .tool-header {
                flex-direction: column;
                align-items: stretch;
            }

            .switch-toggle {
                width: 100%;
            }
        }
    </style>

</body>

</html>
