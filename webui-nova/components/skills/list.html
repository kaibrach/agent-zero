<html>
<head>
    <title>Installed Skills</title>
    <script type="module">
        import { store } from "/components/skills/skills-store.js";
    </script>
</head>
<body>
    <div x-data>
        <template x-if="$store.skillsStore">
            <div x-init="$store.skillsStore.init('installed')" x-destroy="$store.skillsStore.onClose()">
                <div class="section-title">Installed Skills</div>
                <div class="section-description">Review and manage installed skills across global, project, and agent-profile scopes.</div>

                <div class="skills-toolbar">
                    <div class="skills-toolbar-row">
                        <label class="skills-toolbar-item">
                            <span class="skills-toolbar-label">Project</span>
                            <select x-model="$store.skillsStore.projectName" @change="$store.skillsStore.loadSkills()">
                                <option value="">All</option>
                                <template x-for="project in $store.skillsStore.projects" :key="project.key">
                                    <option :value="project.key" x-text="project.label"></option>
                                </template>
                            </select>
                        </label>

                        <label class="skills-toolbar-item">
                            <span class="skills-toolbar-label">Agent profile</span>
                            <select x-model="$store.skillsStore.agentProfileKey" @change="$store.skillsStore.loadSkills()">
                                <option value="">All</option>
                                <template x-for="agentProfile in $store.skillsStore.agentProfiles" :key="agentProfile.key">
                                    <option :value="agentProfile.key" x-text="agentProfile.label"></option>
                                </template>
                            </select>
                        </label>

                        <div class="skills-toolbar-actions">
                            <button type="button" class="button confirm" @click="$store.skillsStore.loadSkills()" :disabled="$store.skillsStore.loading">
                                <span class="icon material-symbols-outlined">refresh</span> Refresh
                            </button>
                        </div>
                    </div>
                </div>

                <div x-show="$store.skillsStore.loading" class="loading"><span>Loading skills...</span></div>
                <div x-show="$store.skillsStore.error" class="error"><span x-text="$store.skillsStore.error"></span></div>

                <template x-if="!$store.skillsStore.loading && !$store.skillsStore.error && $store.skillsStore.skills.length === 0">
                    <div class="skills-empty">No skills found.</div>
                </template>

                <div class="skills-list">
                    <template x-for="skill in $store.skillsStore.skills" :key="skill.path">
                        <div class="skill-card">
                            <div class="skill-header">
                                <div class="skill-heading">
                                    <div class="skill-title" x-text="skill.name || '(unnamed skill)'"></div>
                                    <code class="skill-path" x-text="skill.path"></code>
                                    <div class="skill-badges">
                                        <template x-if="skill.registry && skill.registry.owner && skill.registry.slug">
                                            <span class="skill-badge skill-badge-registry" x-text="`${skill.registry.owner}/${skill.registry.slug}`"></span>
                                        </template>
                                    </div>
                                </div>
                                <div class="skill-actions">
                                    <template x-if="skill.registry && skill.registry.owner && skill.registry.slug">
                                        <button type="button" class="button" @click="$store.skillsStore.updateSkill(skill)" :disabled="$store.skillsStore.busyKey === `update:${skill.path}`">
                                            <span class="icon material-symbols-outlined">system_update</span>
                                            <span x-text="$store.skillsStore.busyKey === `update:${skill.path}` ? 'Updating...' : 'Update'"></span>
                                        </button>
                                    </template>
                                    <button type="button" class="button" @click="$store.skillsStore.openSkill(skill)">
                                        <span class="icon material-symbols-outlined">folder_open</span> Open
                                    </button>
                                    <button type="button" class="button cancel icon-button"
                                        @click="$confirmClick($event, () => $store.skillsStore.deleteSkill(skill))"
                                        :disabled="$store.skillsStore.busyKey === `delete:${skill.path}`">
                                        <span class="icon material-symbols-outlined">delete</span>
                                    </button>
                                </div>
                            </div>
                            <div class="skill-description" x-text="skill.description || 'No description provided.'"></div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>

    <style>
        .skills-toolbar {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            margin-top: 0.5rem;
        }

        .skills-toolbar-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .skills-toolbar-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1 1 18rem;
            min-width: 12rem;
            margin: 0;
        }

        .skills-toolbar-label {
            font-weight: 600;
            color: var(--color-text-secondary);
            white-space: nowrap;
        }

        .skills-toolbar-item select {
            flex: 1 1 auto;
            min-width: 0;
        }

        .skills-toolbar-actions {
            margin-left: auto;
            flex: 0 0 auto;
        }

        .skills-list {
            margin-top: 1rem;
        }

        .skill-card {
            border: 1px solid var(--color-border);
            border-radius: 4px;
            padding: 0.75rem;
            margin-top: 0.75rem;
            background: var(--color-bg-primary);
        }

        .skill-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: nowrap;
            min-width: 0;
        }

        .skill-heading {
            display: flex;
            flex-direction: column;
            min-width: 0;
            flex: 1 1 auto;
        }

        .skill-title {
            font-weight: 600;
            font-size: 1rem;
            min-width: 0;
            flex: 1 1 auto;
        }

        .skill-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-bottom: var(--spacing-sm);
            flex-wrap: wrap;
            min-width: 0;
            flex: 0 1 11.5rem;
            max-width: 100%;
            justify-content: flex-end;
        }

        .skill-description {
            margin-top: 0.35rem;
            color: var(--color-text-secondary);
            font-size: var(--font-size-small);
        }

        .skill-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        .skill-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.15rem 0.45rem;
            border-radius: 999px;
            border: 1px solid var(--color-border);
            background: var(--color-bg-secondary);
            color: var(--color-text-secondary);
            font-size: 0.75rem;
            line-height: 1.2;
        }

        .skill-badge-registry {
            border-color: color-mix(in srgb, var(--color-secondary) 35%, var(--color-border));
            color: var(--color-secondary);
        }

        .skill-path {
            margin-top: 0.35rem;
            font-size: 0.85rem;
            color: var(--color-text-muted);
            min-width: 0;
            max-width: 100%;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .loading,
        .error,
        .skills-empty {
            margin-top: 1rem;
            text-align: center;
        }

        .error {
            color: var(--color-error);
        }

        @media (max-width: 640px) {
            .skills-toolbar-row,
            .skill-header {
                flex-direction: column;
                align-items: stretch;
            }

            .skills-toolbar-actions,
            .skill-actions {
                width: 100%;
                margin-left: 0;
                justify-content: flex-start;
            }

            .skills-toolbar-actions .button,
            .skill-actions .button {
                width: 100%;
            }
        }
    </style>
</body>
</html>
