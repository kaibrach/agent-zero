<html>
<head>
    <title>Browse Skills</title>
    <script type="module">
        import { store } from "/plugins/_skills_hub/webui/skills-store.js";
    </script>
</head>
<body>
    <div x-data>
        <template x-if="$store.skillsStore">
            <div class="pi-browse-shell" x-init="$store.skillsStore.init('browse')" x-destroy="$store.skillsStore.onClose()">
                <section class="pi-browse-hero">
                    <div class="pi-browse-copy">
                        <div class="pi-browse-eyebrow">Community Skills Marketplace</div>
                        <h2 class="pi-browse-title">Discover agent skills for Nova</h2>
                        <p class="pi-browse-description">
                            Browse skills from agentskill.sh, inspect quality and update status, and install them directly into your global, project, or agent-profile scopes.
                        </p>
                    </div>
                    <div class="pi-browse-summary">
                        <div x-text="$store.skillsStore.browseResultsSummary"></div>
                        <div class="pi-browse-summary-sub" x-show="$store.skillsStore.registryHasMore" x-text="`${$store.skillsStore.registrySkills.length} loaded${$store.skillsStore.registryTotalExact ? '' : '+'}`"></div>
                    </div>
                </section>

                <div class="pi-index-toolbar">
                    <label class="pi-search-field">
                        <span class="material-symbols-outlined">search</span>
                        <input type="text"
                            class="pi-search-input"
                            x-model="$store.skillsStore.search"
                            @input="$store.skillsStore.scheduleSearch()"
                            placeholder="Search skills, owners, or categories...">
                    </label>

                    <label class="pi-sort-field">
                        <span class="pi-field-label">Sort</span>
                    <select class="pi-sort-select" x-model="$store.skillsStore.sortBy">
                            <option value="stars">Stars</option>
                            <option value="rating">Rating</option>
                            <option value="name">Name</option>
                            <option value="date">Date</option>
                        </select>
                    </label>

                    <button type="button"
                        class="button icon-button pi-reload-button"
                        aria-label="Reload Skills Marketplace"
                        title="Reload Skills Marketplace"
                        @click="$store.skillsStore.reloadIndex()"
                        :disabled="$store.skillsStore.registryLoading">
                        <span class="material-symbols-outlined">refresh</span>
                    </button>
                </div>

                <div class="pi-filter-row section-row">
                    <template x-for="filter in $store.skillsStore.sectionFilters" :key="filter.key">
                        <button type="button"
                            class="pi-filter-chip"
                            :class="{ active: $store.skillsStore.registrySection === filter.key && !$store.skillsStore.search.trim() }"
                            @click="$store.skillsStore.setRegistrySection(filter.key)">
                            <span x-text="filter.label"></span>
                            <span class="pi-filter-count" x-show="filter.count !== undefined" x-text="filter.count"></span>
                        </button>
                    </template>
                </div>

                <div class="pi-filter-row" x-show="$store.skillsStore.browseFilters.length > 1">
                    <template x-for="filter in $store.skillsStore.browseFilters" :key="filter.key">
                        <button type="button"
                            class="pi-filter-chip"
                            :class="{ active: $store.skillsStore.browseFilter === filter.key, 'pi-filter-chip-update': filter.key === 'update' && filter.count > 0 }"
                            @click="$store.skillsStore.setBrowseFilter(filter.key)">
                            <span x-text="filter.label"></span>
                            <span class="pi-filter-count" x-text="filter.count"></span>
                        </button>
                    </template>
                </div>

                <div x-show="$store.skillsStore.installedUpdateCount > 0 && $store.skillsStore.browseFilter !== 'update'" class="browse-update-notice">
                    <span class="material-symbols-outlined">update</span>
                    <span x-text="`${$store.skillsStore.installedUpdateCount} installed skill${$store.skillsStore.installedUpdateCount === 1 ? '' : 's'} have available updates`"></span>
                    <button class="button subtle" @click="$store.skillsStore.setBrowseFilter('update')">View updates</button>
                </div>

                <div x-show="$store.skillsStore.registryLoading && !$store.skillsStore.registrySkills.length" class="pi-state-card pi-state-loading">
                    <span class="material-symbols-outlined">progress_activity</span>
                    <div>
                        <div class="pi-state-title">Loading Skills Marketplace</div>
                        <div class="pi-state-text" x-text="$store.skillsStore.loadingMessage || 'Loading skills...' "></div>
                    </div>
                </div>

                <div x-show="$store.skillsStore.registryError && !$store.skillsStore.registryLoading" class="pi-state-card pi-state-empty">
                    <span class="material-symbols-outlined">error</span>
                    <div>
                        <div class="pi-state-title">Marketplace request failed</div>
                        <div class="pi-state-text" x-text="$store.skillsStore.registryError"></div>
                    </div>
                </div>

                <div x-show="!$store.skillsStore.registryError && $store.skillsStore.filteredSkills.length > 0" class="pi-grid">
                    <template x-for="skill in $store.skillsStore.paginatedSkills" :key="skill.key">
                        <button type="button" class="pi-card" @click="$store.skillsStore.openDetail(skill)">
                            <div class="pi-card-header">
                                <div class="pi-card-thumb">
                                    <template x-if="$store.skillsStore.getThumbnailUrl(skill)">
                                        <img :src="$store.skillsStore.getThumbnailUrl(skill)" :alt="skill.title" loading="lazy">
                                    </template>
                                    <template x-if="!$store.skillsStore.getThumbnailUrl(skill)">
                                        <span class="material-symbols-outlined pi-card-placeholder">psychology_alt</span>
                                    </template>
                                </div>

                                <div class="pi-card-heading">
                                    <h3 class="pi-card-title" x-text="skill.title"></h3>
                                    <div class="pi-card-subtitle" x-text="$store.skillsStore.getBrowseSubtitle(skill)"></div>
                                    <span class="pi-card-stars">
                                        <span class="material-symbols-outlined">star</span>
                                        <span x-text="skill.githubStars || 0"></span>
                                    </span>
                                </div>
                            </div>

                            <div class="pi-card-body">
                                <div class="pi-card-desc" x-text="$store.skillsStore.truncate(skill.description, 110)"></div>
                            </div>

                            <div class="pi-card-footer">
                                <div class="pi-card-bubbles pi-card-bubbles-tags">
                                    <template x-if="$store.skillsStore.getBrowsePrimaryTag(skill)">
                                        <span class="pi-card-bubble pi-card-bubble-tag">
                                            <span class="material-symbols-outlined">sell</span>
                                            <span class="pi-card-bubble-text" x-text="$store.skillsStore.getBrowsePrimaryTag(skill)"></span>
                                        </span>
                                    </template>
                                    <template x-if="skill.score">
                                        <span class="pi-card-score-chip pi-card-score-rating" :title="`Rating: ${$store.skillsStore.ratingLabel(skill.score)}`">
                                            <span class="material-symbols-outlined">verified</span>
                                            <span x-text="$store.skillsStore.ratingLabel(skill.score)"></span>
                                        </span>
                                    </template>
                                    <template x-if="skill.contentQualityScore != null">
                                        <span class="pi-card-score-chip" :class="`pi-card-score-${$store.skillsStore.scoreTone(skill.contentQualityScore, 'quality')}`" :title="`Quality: ${skill.contentQualityScore}`">
                                            <span class="material-symbols-outlined">analytics</span>
                                            <span x-text="skill.contentQualityScore"></span>
                                        </span>
                                    </template>
                                    <template x-if="skill.securityScore != null">
                                        <span class="pi-card-score-chip" :class="`pi-card-score-${$store.skillsStore.scoreTone(skill.securityScore, 'security')}`" :title="`Security: ${skill.securityScore}`">
                                            <span class="material-symbols-outlined">shield</span>
                                            <span x-text="skill.securityScore"></span>
                                        </span>
                                    </template>
                                </div>

                                <div class="pi-card-bubbles pi-card-bubbles-status">
                                    <template x-if="skill.blocked">
                                        <span class="pi-card-bubble pi-card-bubble-suspended">
                                            <span class="material-symbols-outlined">priority_high</span>
                                            <span class="pi-card-bubble-text">Requirements</span>
                                        </span>
                                    </template>
                                    <template x-if="skill.installed">
                                        <span class="pi-card-bubble pi-card-bubble-installed">
                                            <span class="material-symbols-outlined">check_circle</span>
                                            <span class="pi-card-bubble-text">Installed</span>
                                        </span>
                                    </template>
                                    <template x-if="skill.has_update">
                                        <span class="pi-card-bubble pi-card-bubble-update">
                                            <span class="material-symbols-outlined">update</span>
                                            <span class="pi-card-bubble-text">New version</span>
                                        </span>
                                    </template>
                                </div>
                            </div>
                        </button>
                    </template>
                </div>

                <div x-show="!$store.skillsStore.registryLoading && !$store.skillsStore.registryError && $store.skillsStore.filteredSkills.length === 0" class="pi-state-card pi-state-empty">
                    <span class="material-symbols-outlined">search_off</span>
                    <div>
                        <div class="pi-state-title">No skills match this view</div>
                        <div class="pi-state-text">Try a different search or switch to another marketplace filter.</div>
                    </div>
                </div>

                <div x-show="!$store.skillsStore.registryError && $store.skillsStore.registrySkills.length > 0" class="pi-load-more-wrap">
                    <div class="pi-load-more-text" x-show="$store.skillsStore.canLoadMoreRegistrySkills">
                        Scroll to load more skills.
                    </div>
                    <div class="pi-load-more-text" x-show="$store.skillsStore.registryLoading && $store.skillsStore.registrySkills.length > 0">
                        Loading more skills...
                    </div>
                    <div class="pi-load-more-text" x-show="!$store.skillsStore.canLoadMoreRegistrySkills && !$store.skillsStore.search.trim() && !$store.skillsStore.registryHasMore && !$store.skillsStore.registryLoading">
                        All currently discoverable registry skills are loaded.
                    </div>
                    <div class="pi-load-more-text" x-show="$store.skillsStore.search.trim()">
                        Search results are limited by the public registry feed.
                    </div>
                    <div class="pi-scroll-sentinel" x-init="$store.skillsStore.registerBrowseSentinel($el)"></div>
                </div>

            </div>
        </template>
    </div>

    <style>
        .browse-update-notice {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.85rem;
            border-radius: 8px;
            border: 1px solid color-mix(in srgb, #f59e0b 30%, var(--color-border));
            background: color-mix(in srgb, #f59e0b 8%, var(--color-bg-secondary));
            font-size: 0.88rem;
            color: var(--color-text-primary);
        }
        .browse-update-notice .material-symbols-outlined {
            font-size: 1.1rem;
            color: #f59e0b;
            flex-shrink: 0;
        }
        .browse-update-notice span:not(.material-symbols-outlined) { flex: 1; }

        .pi-browse-shell {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            font-family: "Rubik", Arial, Helvetica, sans-serif;
        }

        .pi-browse-shell button,
        .pi-browse-shell input,
        .pi-browse-shell select {
            font-family: inherit;
        }

        .pi-browse-hero {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.25rem 0 0.35rem;
        }

        .pi-browse-copy {
            max-width: 44rem;
        }

        .pi-browse-eyebrow {
            margin-bottom: 0.4rem;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-highlight);
        }

        .pi-browse-title {
            margin: 0;
            font-size: 1.6rem;
            line-height: 1.15;
            color: var(--color-text-primary);
        }

        .pi-browse-description {
            margin: 0.5rem 0 0;
            max-width: 38rem;
            font-size: 0.95rem;
            line-height: 1.55;
            color: var(--color-text-secondary);
        }

        .pi-browse-summary {
            flex-shrink: 0;
            padding: 0.6rem 0.85rem;
            border: 1px solid var(--color-border);
            border-radius: 0.5rem;
            background: var(--color-panel);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .pi-browse-summary-sub {
            margin-top: 0.18rem;
            font-size: 0.74rem;
            font-weight: 500;
            color: var(--color-text-muted);
        }

        .pi-index-toolbar {
            display: flex;
            gap: 0.75rem;
            align-items: stretch;
        }

        .pi-search-field,
        .pi-sort-field {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.55rem 0;
            border: 0;
            border-bottom: 1px solid var(--color-border);
            border-radius: 0;
        }

        .pi-search-field {
            flex: 1;
            min-width: 0;
        }

        .pi-search-field .material-symbols-outlined {
            font-size: 1.15rem;
            color: var(--color-text-muted);
        }

        .pi-search-input {
            width: 100%;
            min-width: 0;
            padding: 0;
            border: 0;
            outline: none;
            color: var(--color-text-primary);
            font-size: 0.95rem;
            background: transparent;
        }

        .pi-sort-field {
            min-width: 160px;
            flex-shrink: 0;
            justify-content: space-between;
        }

        .pi-reload-button {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            min-height: 0;
            padding: 0.45rem 0.6rem;
        }

        .pi-reload-button .material-symbols-outlined {
            font-size: 1.1rem;
        }

        .pi-field-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .pi-sort-select {
            width: 100%;
            padding: 0;
            border: 0;
            outline: none;
            color: var(--color-text-primary);
            font-size: 0.95rem;
            background: transparent;
        }

        .pi-filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .section-row {
            margin-top: -0.1rem;
        }

        .pi-filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.45rem 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: 0.5rem;
            background: var(--color-panel);
            color: var(--color-text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
        }

        .pi-filter-chip:hover {
            color: var(--color-text-primary);
            background: rgba(255, 255, 255, 0.04);
        }

        .pi-filter-chip.active {
            border-color: var(--color-border);
            background: rgba(255, 255, 255, 0.08);
            color: var(--color-text-primary);
        }

        .pi-filter-chip-update {
            border-color: rgba(59, 130, 246, 0.22);
            color: #93c5fd;
        }

        .pi-filter-chip-update:hover,
        .pi-filter-chip-update.active {
            border-color: rgba(59, 130, 246, 0.38);
            background: rgba(59, 130, 246, 0.12);
            color: #bfdbfe;
        }

        .pi-filter-count {
            padding: 0.12rem 0.4rem;
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.06);
            color: var(--color-text-muted);
            font-size: 0.75rem;
        }

        .pi-state-card {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 1rem 1.05rem;
            border: 1px solid var(--color-border);
            border-radius: 14px;
            background: var(--color-panel);
        }

        .pi-state-card .material-symbols-outlined {
            font-size: 1.5rem;
        }

        .pi-state-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .pi-state-text {
            margin-top: 0.15rem;
            font-size: 0.88rem;
            color: var(--color-text-secondary);
        }

        .pi-state-loading .material-symbols-outlined {
            color: var(--color-highlight);
        }

        .pi-state-empty .material-symbols-outlined {
            color: var(--color-text-muted);
        }

        .pi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 0.95rem;
        }

        .pi-card {
            width: 100%;
            padding: 0;
            border: 1px solid var(--color-border);
            border-radius: 10px;
            background: var(--color-background);
            color: inherit;
            text-align: left;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
        }

        .pi-card:hover {
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        }

        .pi-card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.85rem;
        }

        .pi-card-thumb {
            width: 56px;
            height: 56px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            overflow: hidden;
            background: radial-gradient(circle at top, #6b728089, var(--color-panel)), var(--color-panel);
            border: 1px solid var(--color-border);
        }

        .pi-card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .pi-card-placeholder {
            font-size: 2rem;
            color: var(--color-text-muted);
        }

        .pi-card-heading {
            min-width: 0;
            flex: 1;
        }

        .pi-card-title {
            margin: 0;
            font-size: 1rem;
            line-height: 1.25;
            color: var(--color-text-primary);
        }

        .pi-card-subtitle {
            margin-top: 0.2rem;
            font-size: 0.82rem;
            color: var(--color-text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pi-card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            padding: 0 0.85rem 0.85rem;
        }

        .pi-card-desc {
            font-size: 0.88rem;
            line-height: 1.5;
            color: var(--color-text-secondary);
        }

        .pi-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.65rem 0.85rem 0.75rem;
            border-top: 1px solid var(--color-border);
        }

        .pi-card-stars {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: var(--spacing-xxs) 0;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        .pi-card-stars .material-symbols-outlined {
            font-size: 1rem;
            color: #fbbf24;
        }

        .pi-card-bubbles {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-shrink: 0;
        }

        .pi-card-bubbles-tags {
            min-width: 0;
            flex: 1 1 auto;
            justify-content: flex-start;
        }

        .pi-card-bubbles-status {
            justify-content: flex-end;
        }

        .pi-card-bubble {
            display: inline-flex;
            align-items: center;
            height: 26px;
            padding: 0 0.45rem;
            border-radius: 6px;
            border: 1px solid var(--color-border);
            background: var(--color-panel);
            overflow: hidden;
            cursor: default;
        }

        .pi-card-bubble .material-symbols-outlined {
            font-size: 0.95rem;
            flex-shrink: 0;
            line-height: 1;
        }

        .pi-card-bubble-text {
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            white-space: nowrap;
            font-size: 0.72rem;
            font-weight: 600;
            transition: max-width 0.25s ease, opacity 0.2s ease, margin-left 0.2s ease;
            margin-left: 0;
        }

        .pi-card-bubbles-tags .pi-card-bubble {
            min-width: 0;
            max-width: 100%;
        }

        .pi-card-bubbles-tags .pi-card-bubble-text {
            flex: 1 1 auto;
            min-width: 0;
            max-width: 10rem;
            opacity: 1;
            margin-left: 0.3rem;
            text-overflow: ellipsis;
        }

        /* Score chips on cards */
        .pi-card-score-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            height: 22px;
            padding: 0 0.4rem;
            border-radius: 5px;
            border: 1px solid transparent;
            font-size: 0.72rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .pi-card-score-chip .material-symbols-outlined { font-size: 0.82rem; }

        .pi-card-score-rating { background: rgba(251, 191, 36, 0.12); color: #fbbf24; border-color: rgba(251, 191, 36, 0.28); }
        .pi-card-score-strong { background: rgba(34, 197, 94, 0.12); color: #4ade80; border-color: rgba(34, 197, 94, 0.28); }
        .pi-card-score-medium { background: rgba(59, 130, 246, 0.12); color: #60a5fa; border-color: rgba(59, 130, 246, 0.28); }
        .pi-card-score-caution { background: rgba(245, 158, 11, 0.12); color: #fbbf24; border-color: rgba(245, 158, 11, 0.28); }
        .pi-card-score-weak { background: rgba(248, 113, 113, 0.12); color: #f87171; border-color: rgba(248, 113, 113, 0.28); }

        .pi-card-bubbles-status .pi-card-bubble:hover .pi-card-bubble-text {
            max-width: 8rem;
            opacity: 1;
            margin-left: 0.3rem;
        }

        .pi-card-bubble-tag .material-symbols-outlined {
            color: var(--color-text-muted);
        }

        .pi-card-bubble-tag .pi-card-bubble-text {
            color: var(--color-text-secondary);
        }

        .pi-card-bubble-installed .material-symbols-outlined,
        .pi-card-bubble-installed .pi-card-bubble-text {
            color: #4ade80;
        }

        .pi-card-bubble-installed:hover {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
        }

        .pi-card-bubble-update .material-symbols-outlined,
        .pi-card-bubble-update .pi-card-bubble-text {
            color: #60a5fa;
        }

        .pi-card-bubble-update:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .pi-card-bubble-suspended .material-symbols-outlined,
        .pi-card-bubble-suspended .pi-card-bubble-text {
            color: #f59e0b;
        }

        .pi-card-bubble-suspended:hover {
            background: rgba(245, 158, 11, 0.12);
            border-color: rgba(245, 158, 11, 0.35);
        }

        .pi-load-more-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
